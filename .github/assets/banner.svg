<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 280" role="img" aria-label="Tim Wei — AI/ML Engineer building systems that ship">
  <defs>
    <!-- background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1A1F"/>
      <stop offset="100%" stop-color="#0A1418"/>
    </linearGradient>

    <!-- ember radial glow -->
    <radialGradient id="emberGlow" cx="80%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>

    <!-- mint subtle glow -->
    <radialGradient id="mintGlow" cx="10%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#00D9A3" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#00D9A3" stop-opacity="0"/>
    </radialGradient>

    <!-- grid pattern -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1F3038" stroke-width="0.6" opacity="0.5"/>
    </pattern>

    <!-- pattern mask: fade grid towards edges -->
    <radialGradient id="gridFade" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridMask">
      <rect width="100%" height="100%" fill="url(#gridFade)"/>
    </mask>
  </defs>

  <!-- background -->
  <rect width="1280" height="280" fill="url(#bg)"/>
  <rect width="1280" height="280" fill="url(#grid)" mask="url(#gridMask)"/>
  <rect width="1280" height="280" fill="url(#emberGlow)"/>
  <rect width="1280" height="280" fill="url(#mintGlow)"/>

  <!-- top tag -->
  <g transform="translate(80, 70)">
    <line x1="0" y1="0" x2="32" y2="0" stroke="#FF6B35" stroke-width="1.5"/>
    <text x="46" y="4"
      font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
      font-size="13"
      letter-spacing="2"
      fill="#FF6B35">AI/ML ENGINEER · 2026</text>
  </g>

  <!-- main name -->
  <text x="80" y="160"
    font-family="'Fraunces', Georgia, 'Noto Serif TC', serif"
    font-size="82"
    font-weight="500"
    letter-spacing="-1.5"
    fill="#E8EEF1">Tim Wei<tspan fill="#FF6B35" font-style="italic">.</tspan></text>

  <!-- subtitle line 1 -->
  <text x="80" y="208"
    font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
    font-size="15"
    fill="#8A9BA3">AI/ML Engineer @ EY · Tamkang Stats MS · Teaching RAG @ NTU</text>

  <!-- subtitle line 2 (italic philosophy) -->
  <text x="80" y="240"
    font-family="'Fraunces', Georgia, 'Noto Serif TC', serif"
    font-size="17"
    font-style="italic"
    fill="#C5D0D5">From research to production — building AI that actually ships.</text>

  <!-- right-side decorative dots / stats hint -->
  <g transform="translate(880, 80)" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace">
    <!-- column 1 -->
    <text x="0"   y="0"  font-size="11" fill="#5A6B73" letter-spacing="1.5">CLASS RANK</text>
    <text x="0"   y="36" font-size="38" fill="#E8EEF1" font-family="'Fraunces', Georgia, serif" font-weight="300">#1</text>

    <!-- column 2 -->
    <text x="120" y="0"  font-size="11" fill="#5A6B73" letter-spacing="1.5">SHIPPED</text>
    <text x="120" y="36" font-size="38" fill="#E8EEF1" font-family="'Fraunces', Georgia, serif" font-weight="300">4<tspan fill="#FF6B35" font-style="italic">+</tspan></text>

    <!-- column 3 -->
    <text x="240" y="0"  font-size="11" fill="#5A6B73" letter-spacing="1.5">AWARDS</text>
    <text x="240" y="36" font-size="38" fill="#E8EEF1" font-family="'Fraunces', Georgia, serif" font-weight="300">5<tspan fill="#FF6B35" font-style="italic">+</tspan></text>

    <!-- divider line under stats -->
    <line x1="0" y1="60" x2="320" y2="60" stroke="#1F3038" stroke-width="1"/>

    <!-- meta row -->
    <text x="0"   y="84" font-size="10" fill="#5A6B73" letter-spacing="1.8">EY × NTU · TAIPEI · 2026</text>
  </g>

  <!-- mint pulse dot bottom-left -->
  <g transform="translate(80, 270)">
    <circle cx="0" cy="-4" r="3" fill="#00D9A3" opacity="0.9"/>
    <text x="14" y="0"
      font-family="ui-monospace, 'JetBrains Mono', monospace"
      font-size="10"
      letter-spacing="1.5"
      fill="#5A6B73">OPEN TO COLLABORATION</text>
  </g>
</svg>
